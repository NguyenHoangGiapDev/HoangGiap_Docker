<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Chủ</title>

    <style>
        body{
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
            padding-top: 100px;
        }

        h1{
            color: #2c3e50;
        }

        .box{
            background: white;
            width: 500px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button{
            padding: 10px 20px;
            border: none;
            background: #3498db;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #2980b9;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Xin chào Giáp 🚀</h1>

    <p>
        Bạn đã chạy thành công ứng dụng
        Spring Boot bằng Docker.
    </p>

    <p>
        Chào mừng bạn đến với trang chủ.
    </p>

    <button onclick="alert('Docker + Spring Boot hoạt động rồi!')">
        Test Button
    </button>

</div>

</body>
</html>
